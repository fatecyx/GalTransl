Core:
  Name: RPG脚本检查
  Type: text
  Module: text_coder_rpg

Documentation:
  Author: cyx
  Version: 2.0
  Description: RPG脚本检查、控制符检查、去掉RPG头尾控制符、替换彩色控制符为【】、替换其他控制符为＠

Settings: # 这里存放插件的设置
  替换颜色代码: True  # 替换颜色控制符\C[N]为{colorN: text}形式（便于AI翻译保留颜色语义）
  替换ruby注音: True  # 展开\r[漢字,かな]为汉字（かな）形式
  替换其他控制符: True # 去掉RPG头尾控制符、替换其他控制符为＠
  检查脚本变量: True   # 检查翻译后控制符、脚本变量是否存在
  检查中括号内容一致: True # 检查中括号数量是否正确
  主人公变量: \s[9]
